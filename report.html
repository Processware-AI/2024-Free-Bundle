// ── Derived data ──
const catOrder = ["Photography","Business / Agency","Portfolio / Personal","Blog / Magazine","E-commerce / Shop","Architecture / Interior","Landing Page","Food / Restaurant","Entertainment / Event","Podcast / Media"];
const catCounts = {};
catOrder.forEach(c => catCounts[c] = 0);
projects.forEach(p => catCounts[p.category] = (catCounts[p.category]||0)+1);

const allTech = {};
projects.forEach(p => p.tech.forEach(t => allTech[t]=(allTech[t]||0)+1));
const topTech = Object.entries(allTech).sort((a,b)=>b[1]-a[1]).slice(0,10);

const staticCount = projects.filter(p=>!p.needsServer).length;
const serverCount = projects.filter(p=>p.needsServer).length;
const totalPages = projects.reduce((s,p)=>s+p.pages.length,0);

// ── Stats ──
document.getElementById('stats').textContent = projects.length+' projects \u00b7 '+catOrder.length+' categories';

// ── Filter bar ──
const filterBar = document.getElementById('filterBar');
filterBar.innerHTML = '<label>Category:</label>';
const allChip = document.createElement('button');
allChip.className='chip active';allChip.dataset.cat='all';allChip.innerHTML='All<span class="cnt">'+projects.length+'</span>';
filterBar.appendChild(allChip);
catOrder.forEach(cat=>{
  if(!catCounts[cat])return;
  const b=document.createElement('button');
  b.className='chip';b.dataset.cat=cat;
  b.innerHTML=cat+'<span class="cnt">'+catCounts[cat]+'</span>';
  filterBar.appendChild(b);
});

let activeCat='all';
filterBar.addEventListener('click',e=>{
  const chip=e.target.closest('.chip');if(!chip)return;
  filterBar.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  chip.classList.add('active');
  activeCat=chip.dataset.cat;
  render();
});

// ── Search ──
const searchInput=document.getElementById('search');
searchInput.addEventListener('input',()=>render());

// ── Summary ──
function renderSummary(){
  const s=document.getElementById('summary');
  s.innerHTML=`
  <h2>Overview</h2>
  <div class="summary-grid">
    <div class="summary-card"><div class="big">${projects.length}</div><div class="lbl">Total Projects</div></div>
    <div class="summary-card"><div class="big">${catOrder.length}</div><div class="lbl">Categories</div></div>
    <div class="summary-card"><div class="big">${staticCount}</div><div class="lbl">Static (Browser)</div></div>
    <div class="summary-card"><div class="big" style="color:var(--orange)">${serverCount}</div><div class="lbl">Server Required</div></div>
    <div class="summary-card"><div class="big">${totalPages}</div><div class="lbl">Total Pages</div></div>
  </div>
  <div style="margin-bottom:16px">
    <div class="section-label" style="margin-bottom:8px">Top Technologies</div>
    <div class="tech-list">${topTech.map(([t,c])=>'<span class="tech-tag">'+t+' ('+c+')</span>').join('')}</div>
  </div>
  `;
}
renderSummary();

// ── Render ──
function render(){
  const q=searchInput.value.trim().toLowerCase();
  let filtered=projects;
  if(activeCat!=='all') filtered=filtered.filter(p=>p.category===activeCat);
  if(q) filtered=filtered.filter(p=>{
    const s=(p.name+' '+p.title+' '+p.category+' '+p.tech.join(' ')+' '+p.features.join(' ')+' '+p.description+' '+p.usecase).toLowerCase();
    return q.split(/\s+/).every(t=>s.includes(t));
  });

  // TOC
  const tocWrap=document.getElementById('tocWrap');
  tocWrap.innerHTML='<div class="toc"><h2>Table of Contents ('+filtered.length+' projects)</h2><div class="toc-grid" id="tocGrid"></div></div>';
  const tocGrid=document.getElementById('tocGrid');
  filtered.forEach((p,i)=>{
    const d=document.createElement('div');d.className='toc-item';
    d.innerHTML='<span class="num">'+(String(i+1).padStart(2,'0'))+'</span><a href="#proj-'+p.name+'">'+p.title+'</a>';
    tocGrid.appendChild(d);
  });

  // Cards by category
  const content=document.getElementById('content');
  content.innerHTML='';
  const grouped={};
  filtered.forEach(p=>{if(!grouped[p.category])grouped[p.category]=[];grouped[p.category].push(p);});

  let globalIdx=1;
  catOrder.forEach(cat=>{
    if(!grouped[cat])return;
    const h=document.createElement('div');
    h.className='cat-group-title';
    h.innerHTML=cat+' <span class="cnt">('+grouped[cat].length+')</span>';
    content.appendChild(h);

    const grid=document.createElement('div');grid.className='cards';
    grouped[cat].forEach(p=>{
      const num=String(globalIdx).padStart(2,'0');
      const serverBadge=p.needsServer?'<span class="badge badge-server">SERVER</span>':'<span class="badge badge-static">STATIC</span>';
      const card=document.createElement('div');card.className='card';card.id='proj-'+p.name;
      card.innerHTML=`
        <div class="card-head">
          <div class="card-num">${num}</div>
          <div class="card-title-wrap">
            <div class="card-title"><a href="${p.entry}" target="_blank">${p.title}</a>${serverBadge}<span class="badge badge-cat">${p.category}</span></div>
            <div class="card-subtitle">${p.name}</div>
          </div>
        </div>
        <div class="card-body">
          <div class="desc">${p.description}</div>
          <div class="meta-grid">
            <div class="meta-box"><div class="label">Run</div><div class="value">${p.run}</div></div>
            <div class="meta-box"><div class="label">Stop</div><div class="value">${p.stop}</div></div>
            <div class="meta-box"><div class="label">Usecase</div><div class="value">${p.usecase}</div></div>
            <div class="meta-box"><div class="label">Entry</div><div class="value"><a href="${p.entry}" target="_blank">${p.entry}</a></div></div>
          </div>
          <div class="section-label">Technologies</div>
          <div class="tech-list">${p.tech.map(t=>'<span class="tech-tag">'+t+'</span>').join('')}</div>
          <div class="section-label">Features</div>
          <div class="feature-list">${p.features.map(f=>'<span class="feature-tag">'+f+'</span>').join('')}</div>
          <div class="section-label">Pages (${p.pages.length})</div>
          <div class="page-list">${p.pages.map(pg=>'<span class="page-tag">'+pg+'</span>').join('')}</div>
        </div>`;
      grid.appendChild(card);
      globalIdx++;
    });
    content.appendChild(grid);
  });
}
render();

// ── Back to top ──
const backTop=document.getElementById('backTop');
window.addEventListener('scroll',()=>{backTop.classList.toggle('show',window.scrollY>400);});
backTop.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
</script>
